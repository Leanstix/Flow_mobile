name: Refresh mobile lockfile

on:
  push:
    branches: [feat/production-mobile-app]

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-mobile-app
      - uses: actions/setup-node@v5
        with:
          node-version: "22.13.1"
      - name: Generate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit lockfile and remove bootstrap workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git rm .github/workflows/refresh-lock.yml
          git commit -m "Generate mobile dependency lockfile"
          git push origin HEAD:feat/production-mobile-app
