name: Sync Expo document picker

on:
  push:
    branches: [feat/media-threading-lowbandwidth]
    paths: [.github/workflows/sync-document-picker.yml]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/media-threading-lowbandwidth
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22.13.1'
          cache: npm
      - run: npm ci
      - run: npx expo install expo-document-picker
      - name: Commit deterministic package files and remove this workflow
        run: |
          rm .github/workflows/sync-document-picker.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/sync-document-picker.yml
          git commit -m "Add Expo document picker"
          git push origin HEAD:feat/media-threading-lowbandwidth
