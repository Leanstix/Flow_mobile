name: One-time keyboard modal hardening

on:
  push:
    branches:
      - fix/remaining-keyboard-modals

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/remaining-keyboard-modals

      - name: Add keyboard insets to every remaining editor sheet
        run: |
          node <<'NODE'
          const fs = require('fs');

          const replacements = [
            ['src/app/(tabs)/groups.tsx', '<ScrollView contentContainerStyle={styles.modalContent} keyboardShouldPersistTaps="handled">', '<ScrollView automaticallyAdjustKeyboardInsets contentContainerStyle={styles.modalContent} keyboardDismissMode="interactive" keyboardShouldPersistTaps="handled">'],
            ['src/app/(tabs)/marketplace.tsx', '<ScrollView contentContainerStyle={styles.modalContent} keyboardShouldPersistTaps="handled">', '<ScrollView automaticallyAdjustKeyboardInsets contentContainerStyle={styles.modalContent} keyboardDismissMode="interactive" keyboardShouldPersistTaps="handled">'],
            ['src/app/group/[slug].tsx', '<ScrollView contentContainerStyle={styles.modalContent} keyboardShouldPersistTaps="handled">', '<ScrollView automaticallyAdjustKeyboardInsets contentContainerStyle={styles.modalContent} keyboardDismissMode="interactive" keyboardShouldPersistTaps="handled">'],
            ['src/app/marketplace/[id].tsx', '<ScrollView contentContainerStyle={styles.modalContent} keyboardShouldPersistTaps="handled">', '<ScrollView automaticallyAdjustKeyboardInsets contentContainerStyle={styles.modalContent} keyboardDismissMode="interactive" keyboardShouldPersistTaps="handled">'],
            ['src/components/message-attachment-picker.tsx', '<ScrollView contentContainerStyle={styles.form} keyboardShouldPersistTaps="handled">', '<ScrollView automaticallyAdjustKeyboardInsets contentContainerStyle={styles.form} keyboardDismissMode="interactive" keyboardShouldPersistTaps="handled">'],
          ];

          for (const [path, before, after] of replacements) {
            const source = fs.readFileSync(path, 'utf8');
            const occurrences = source.split(before).length - 1;
            if (occurrences !== 1) {
              throw new Error(`${path}: expected exactly one keyboard modal target, found ${occurrences}`);
            }
            fs.writeFileSync(path, source.replace(before, after));
          }
          NODE

      - name: Commit hardened modal editors and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/keyboard-modal-hardening.yml
          git add src/app src/components/message-attachment-picker.tsx
          git commit -m "Harden remaining editor sheets against keyboard overlap"
          git push origin HEAD:fix/remaining-keyboard-modals
