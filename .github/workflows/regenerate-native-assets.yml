name: Regenerate Native Assets

on:
  workflow_dispatch:
  push:
    branches:
      - fix/eas-android-image-assets
    paths:
      - scripts/generate-native-assets.mjs
      - app.json
      - .github/workflows/regenerate-native-assets.yml

permissions:
  contents: write

jobs:
  regenerate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate standards-compliant PNG assets
        run: node scripts/generate-native-assets.mjs

      - name: Install dependencies
        run: npm ci

      - name: Verify Android prebuild
        run: npx expo prebuild --clean --no-install --platform android

      - name: Remove generated native directory
        run: rm -rf android

      - name: Commit regenerated assets
        run: |
          if git diff --quiet -- assets/images/icon.png assets/images/android-icon-foreground.png assets/images/splash-icon.png; then
            echo "Native assets are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/icon.png assets/images/android-icon-foreground.png assets/images/splash-icon.png
          git commit -m "Regenerate Android-compatible native assets"
          git push
