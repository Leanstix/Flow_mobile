name: Sync video trim lockfile

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'fix/client-side-video-export'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/client-side-video-export
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22.13.1'
          cache: npm
      - run: npm install
      - run: npx expo install --check
      - name: Commit package lock and remove this workflow
        run: |
          rm .github/workflows/sync-video-trim-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/sync-video-trim-lock.yml
          git commit -m "Lock client-side video trimming dependency"
          git push origin HEAD:fix/client-side-video-export
