version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      expo-and-react-native:
        patterns:
          - "expo*"
          - "@expo/*"
          - "react-native*"
      state-and-data:
        patterns:
          - "@tanstack/*"
          - "zustand"
          - "axios"
